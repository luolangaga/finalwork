name: Build and Push Docker Images

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

env:
  REGISTRY: docker.io
  SPRING_IMAGE: ${{ secrets.DOCKER_USERNAME }}/library-spring-boot
  DOTNET_IMAGE: ${{ secrets.DOCKER_USERNAME }}/library-dotnet-api
  VUE_IMAGE: ${{ secrets.DOCKER_USERNAME }}/library-vue-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: spring-boot
            dockerfile: ./Dockerfile
            context: .
            image-env: SPRING_IMAGE
          - name: dotnet-api
            dockerfile: ./dotnet-service/Dockerfile
            context: .
            image-env: DOTNET_IMAGE
          - name: vue-web
            dockerfile: ./frontend/Dockerfile
            context: .
            image-env: VUE_IMAGE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env[matrix.service.image-env] }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max