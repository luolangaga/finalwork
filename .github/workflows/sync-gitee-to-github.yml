name: Sync Gitee to GitHub

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout from GitHub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Gitee remote and fetch
        run: |
          git remote add gitee https://gitee.com/swunjavaclass/finalwork.git
          git fetch gitee master

      - name: Merge and push to GitHub
        run: |
          git checkout master
          git merge gitee/master --allow-unrelated-histories -m "sync: merge from gitee"
          git push origin master
        continue-on-error: true

      - name: Force sync if merge failed
        if: failure()
        run: |
          git checkout master
          git reset --hard gitee/master
          git push --force origin master
