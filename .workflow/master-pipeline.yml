version: '1.0'
name: master-pipeline
displayName: MasterPipeline
stages:
  - stage:
    name: compile
    displayName: 编译
    steps:
      - step: build@maven
        name: build_maven
        displayName: Maven 构建
        jdkVersion: 8
        mavenVersion: 3.3.9
        commands:
          - mvn -B clean package -Dmaven.test.skip=true
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./target
      - step: publish@general_artifacts
        name: publish_general_artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        dependsOn: build_maven
  - stage:
    name: release
    displayName: 发布
    steps:
      - step: publish@release_artifacts
        name: publish_release_artifacts
        displayName: '发布'
        dependArtifact: output
        version: '1.0.0.0'
        autoIncrement: true
  - stage:
    name: sync-to-github
    displayName: 同步到GitHub
    steps:
      - step: shell@agent
        name: sync_github
        displayName: 推送至GitHub仓库
        script:
          - git remote add github https://${GITHUB_TOKEN}@github.com/luolangaga/finalwork.git
          - git push github master --force
triggers:
  push:
    branches:
      include:
        - master
